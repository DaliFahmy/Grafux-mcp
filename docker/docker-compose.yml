version: "3.9"

services:
  # ── Grafux-mcp web server ─────────────────────────────────────────────────
  grafux-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8002:8002"
    environment:
      - SERVICE_NAME=grafux-mcp
      - ENVIRONMENT=development
      - LOG_LEVEL=INFO
      - PORT=8002
      - DATABASE_URL=postgresql+asyncpg://grafux:grafux@postgres:5432/grafux_mcp
      - REDIS_URL=redis://redis:6379/1
      - INTERNAL_SERVICE_KEY=dev_internal_key
      - BACKEND_INTERNAL_URL=http://host.docker.internal:8000
      - ORCHESTRATOR_INTERNAL_URL=http://host.docker.internal:8001
      - DEVICES_INTERNAL_URL=http://host.docker.internal:8003
    volumes:
      - ../data:/app/data
      - ../tools:/app/tools
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: grafux
      POSTGRES_PASSWORD: grafux
      POSTGRES_DB: grafux_mcp
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grafux -d grafux_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
